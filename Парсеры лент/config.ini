[database]
# Тип БД (sqlite, postgresql, mysql)
db_type = sqlite
# Путь к файлу БД для SQLite (один источник - одна БД)
lenta_db_path = lenta_news.db
ria_db_path = ria_news.db
commersant_db_path = commersant_news.db

[parsers]
# Задержка между запросами в секундах
request_delay = 1.0
# Количество одновременных запросов
concurrent_requests = 3
# Таймаут запроса в секундах
request_timeout = 30
# Количество повторных попыток при ошибке
retries = 6
# Проверка SSL сертификата (True/False)
verify_ssl = False

[lenta]
# Базовый URL
base_url = https://lenta.ru
# Категории для парсинга (через запятую)
categories = economics, world
# Формат даты в URL
date_format = %Y/%m/%d
# Дата начала периода парсинга (формат: YYYY-MM-DD)
start_date = 2020-01-01
# Дата окончания периода парсинга (формат: YYYY-MM-DD)
end_date = 2025-12-31

[ria]
# Базовый URL
base_url = https://ria.ru
# URL для поиска новостей (если категории не указаны)
search_url = https://ria.ru/search/
# URL RSS ленты
rss_url = https://ria.ru/export/rss2/archive/index.xml
# Категории для парсинга (через запятую: Экономика, Политика)
categories = Экономика, Политика
# Формат даты в URL (если используется)
date_format = %Y%m%d
# Дата начала периода парсинга (формат: YYYY-MM-DD)
start_date = 2020-01-01
# Дата окончания периода парсинга (формат: YYYY-MM-DD)
end_date = 2025-12-31

[commersant]
# Категории для парсинга
categories = Политика, Экономика, Финансы, Потребрынок
# URL страниц рубрик (HTML)
url_Политика = https://www.kommersant.ru/rubric/2
url_Экономика = https://www.kommersant.ru/rubric/3
url_Финансы = https://www.kommersant.ru/rubric/40
url_Потребрынок = https://www.kommersant.ru/rubric/41
# Дата начала периода парсинга (формат: YYYY-MM-DD)
start_date = 2020-01-01
# Дата окончания периода парсинга (формат: YYYY-MM-DD)
end_date = 2025-12-31